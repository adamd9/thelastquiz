<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1"
    />
    <title>The Last Quiz</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/site-links.js"></script>
    <script src="/static/track.js"></script>
    <script type="module" src="/static/app.js"></script>
  </head>
  <body>
    <header class="app-bar">
      <div class="app-bar-inner">
        <button class="app-brand" type="button" data-nav="dashboard">
          <img class="app-logo" src="/static/logo2.png" alt="The Last Quiz logo" />
          <div>
            <p class="kicker">The Last Quiz</p>
            <div class="app-title">Do AI models have personality?</div>
          </div>
        </button>
        <button class="nav-toggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="app-nav">
          <span></span><span></span><span></span>
        </button>
        <nav class="app-nav" id="app-nav">
          <a class="nav-link" href="/" data-dest="home">Home</a>
          <a class="nav-link" href="/rankings" data-dest="rankings">Rankings</a>
          <button class="secondary" data-nav="dashboard">Dashboard</button>
          <span class="auth-control" data-auth-control hidden>
            <button class="secondary" type="button" data-auth="login">Sign in</button>
            <span class="auth-user" data-auth="user" hidden>
              <span class="auth-email" data-auth="email"></span>
              <button class="link-button" type="button" data-auth="logout">Sign out</button>
            </span>
          </span>
        </nav>
      </div>
    </header>

    <main class="app-shell">
      <stepper-nav></stepper-nav>

      <section class="workspace">
        <div class="stack step-panel" data-step="0">
          <run-dashboard></run-dashboard>
        </div>
        <div class="stack step-panel" data-step="1">
          <quiz-uploader></quiz-uploader>
        </div>
        <div class="stack step-panel" data-step="2">
          <quiz-library></quiz-library>
        </div>
        <div class="stack step-panel" data-step="3">
          <model-picker></model-picker>
        </div>
        <div class="stack step-panel" data-step="4">
          <run-creator></run-creator>
        </div>
      </section>
    </main>
    <markdown-viewer></markdown-viewer>
    <chart-viewer></chart-viewer>
  </body>
</html>
