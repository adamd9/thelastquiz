# OpenRouter model configuration overrides and group selections.
# Model IDs match the OpenRouter catalog (no prefix required).

models:
  # Per-model tuning lives here (single source of truth): any model needing
  # different params — token caps, reasoning budgets, temperature — gets a
  # defaultParams block below. The runner applies these over its global defaults
  # (temperature 0.2, max_tokens 512), so adding/adjusting a model is config-only.
  #
  # Current benchmark lineup. Kept fast: bounded output, and reasoning models
  # have their thinking budget capped so they don't spend minutes on a 1-5 item.
  - id: anthropic/claude-sonnet-5
    description: "Anthropic Claude Sonnet 5 via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 512
    maxConcurrency: 2

  - id: x-ai/grok-4.3
    description: "xAI Grok 4.3 via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 512
    maxConcurrency: 2

  - id: google/gemini-2.5-pro
    description: "Google Gemini 2.5 Pro (reasoning) via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 512
      reasoning:
        effort: low
    maxConcurrency: 2

  - id: deepseek/deepseek-r1
    description: "DeepSeek R1 (reasoning) via OpenRouter"
    # R1 always produces long chain-of-thought. Cap the reasoning budget AND
    # leave room in max_tokens for the actual answer, otherwise the reply is
    # truncated to empty content (which scored as refusals). Validated live.
    defaultParams:
      temperature: 0.2
      max_tokens: 1200
      reasoning:
        max_tokens: 600
    maxConcurrency: 2

  - id: meta-llama/llama-3.3-70b-instruct
    description: "Meta Llama 3.3 70B Instruct via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 512
    maxConcurrency: 2

  - id: openai/gpt-4o
    description: "OpenAI GPT-4o via OpenRouter"
    defaultParams:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 256
    maxConcurrency: 2

  - id: openai/gpt-4o-mini
    description: "OpenAI GPT-4o mini via OpenRouter"
    defaultParams:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 256
    maxConcurrency: 3

  - id: openai/gpt-4-turbo
    description: "OpenAI GPT-4 Turbo via OpenRouter"
    defaultParams:
      temperature: 0.2
      top_p: 1.0
      max_tokens: 256
    maxConcurrency: 2

  - id: anthropic/claude-3.5-sonnet
    description: "Anthropic Claude 3.5 Sonnet via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 256
    maxConcurrency: 2

  - id: anthropic/claude-3.5-haiku
    description: "Anthropic Claude 3.5 Haiku via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 256
    maxConcurrency: 3

  - id: anthropic/claude-3-opus
    description: "Anthropic Claude 3 Opus via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_tokens: 256
    maxConcurrency: 1

  - id: google/gemini-1.5-pro
    description: "Google Gemini 1.5 Pro via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_output_tokens: 256
    maxConcurrency: 1

  - id: google/gemini-1.5-flash
    description: "Google Gemini 1.5 Flash via OpenRouter"
    defaultParams:
      temperature: 0.2
      max_output_tokens: 256
    maxConcurrency: 2

# Curated model groups now live in the frontend (web/static/utils.js -> buildModelGroups),
# so the main app and the admin console share one consistent set (e.g. "The classics",
# "Frontier models", "Best open source"). No legacy backend groups are defined here.
